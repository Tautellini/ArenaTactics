<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ArenaTactics</title>
  <script>
    // SPA deep-link redirect for GitHub Pages.
    // Strips the repo base (/ArenaTactics) from the path, stores the route
    // in sessionStorage, then redirects to the app root.
    // index.html reads this and restores the URL before the app boots.
    var base = '/ArenaTactics';
    var route = window.location.pathname.replace(base, '') || '/';
    if (route !== '/') {
      sessionStorage.setItem('spa-route', route);
    }
    window.location.replace(base + '/');
  </script>
</head>
</html>
